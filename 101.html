<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>99 Names</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0b2e13, #14532d);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 2px solid #ddd;
    }

    .header-link {
      font-size: 16px;
      text-decoration: none;
      color: #86efac;
      font-weight: bold;
    }

    .name {
      font-size: 32px;
      font-weight: bold;
      color: #fef08a;
      border: 3px double #fef08a;
      padding: 5px 15px;
    }

    .number {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background: rgba(255,255,255,0.1);
      padding: 5px 15px;
      border-radius: 25px;
    }

    .center-content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;

  padding: 3px;
}

.description {
  font-size: 24px;
  line-height: 1.4;
  color: #dcfce7;

  max-width: 100%;
  width: 100%;

  padding: 3px;
}

    .highlight {
      font-size: 24px;
      font-weight: bold;
      color: #fef08a;
      background: rgba(255,255,255,0.15);
      padding: 2px 10px;
      border-radius: 20px;
      display: inline-block;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 15px 20px;
      border-top: 1px solid #ddd;
    }

    .footer div {
      font-size: 32px;
      color: #bbf7d0;
    }
  </style>
</head>
<body>

  <div class="header-row">
    <a class="header-link" href="https://radio.garden/listen/radio-786-fm-100-4/8Nn9iBqd" target="_blank">786</a>
    <span class="name">Al-Hakeem</span>
    <span class="number">47</span>
  </div>

  <div class="center-content">
    <div class="description">
      Anyone who repeats this name,
      <span class="highlight">Allah</span>
      will open for him the doors of
      knowledge & wisdom
      Anyone whose particular task does not
      seem to be accomplished should
      repeat this Beautiful Name of
  Allah frequently and constantly.
  Soon will this task be accomplished.

    </div>
  </div>

  <div class="footer">
    <div>🤲 Insha Allah 🤲</div>
  </div>
<script src="swipe.js"></script>
</body>
</html>
