<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>99 Names</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 2px solid #ddd;
    }

    .header-link {
      font-size: 16px;
      text-decoration: none;
      color: #d4af37;
      font-weight: bold;
    }

    .name {
      font-size: 32px;
      font-weight: bold;
      color: #ffd700;
      border: 3px double #ffd700;
      padding: 5px 15px;
    }

    .number {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background: #222;
      padding: 5px 15px;
      border-radius: 25px;
    }

    .center-content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;

  padding: 3px;
}

.description {
  font-size: 24px;
  line-height: 1.4;
  color: #ddd;

  max-width: 100%;
  width: 100%;

  padding: 3px;
}

    .highlight {
      font-size: 24px;
      font-weight: bold;
      color: #ffd700;
      background: #333;
      padding: 2px 10px;
      border-radius: 20px;
      display: inline-block;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 15px 20px;
      border-top: 1px solid #ddd;
      color: #aaa;
    }

    .footer div {
      font-size: 32px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <div class="header-row">
    <a class="header-link" href="https://radio.garden/listen/radio-786-fm-100-4/8Nn9iBqd" target="_blank">786</a>
    <span class="name">Al-Baaqi</span>
    <span class="number">96</span>
  </div>

  <div class="center-content">
    <div class="description">

      <span class="highlight">Allah.</span> will grant protection & accept
      all the virtuous deeds of one who says this beautiful name of 
      <span class="highlight">Allah.</span>
    </div>
  </div>

  <div class="footer">
    <div>🤲 Insha Allah 🤲</div>
  </div>
<script src="swipe.js"></script>
</body>
</html>
